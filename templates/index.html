<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherPro | AI-Powered Forecast</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .navbar {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            flex-grow: 1;
            max-width: 500px;
            margin: 0 2rem;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 0.8rem 1.5rem;
            border-radius: 99px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .main-content {
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .current-weather-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .current-weather-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.2;
            z-index: 0;
        }

        .weather-info {
            position: relative;
            z-index: 1;
        }

        .city-name {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .date-time {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .temp-main {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
        }

        .weather-desc {
            font-size: 1.5rem;
            color: var(--text-dim);
            text-transform: capitalize;
        }

        .weather-visual {
            text-align: center;
        }

        .weather-icon-large {
            width: 200px;
            height: 200px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .ai-prediction-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 2rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .ai-badge {
            background: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .ai-value {
            font-size: 3rem;
            font-weight: 700;
            color: white;
        }

        .ai-label {
            color: var(--text-dim);
            margin-top: 1rem;
        }

        .forecast-section {
            grid-column: span 2;
            margin-top: 1rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-left: 0.5rem;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
        }

        .forecast-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.08);
        }

        .forecast-date {
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .forecast-icon {
            width: 80px;
            height: 80px;
        }

        .forecast-temp {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--glass);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .forecast-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 640px) {
            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <nav class="navbar">
        <div class="logo">WeatherPro AI</div>
        <div class="search-container">
            <input type="text" id="cityInput" placeholder="Search for a city..." onkeypress="handleSearch(event)">
        </div>
        <div class="user-profile">
            <span style="color: var(--text-dim)">Live Data &bull; OpenWeather</span>
        </div>
    </nav>

    <div class="main-content">
        <div class="current-weather-card" id="currentWeather">
            <div class="weather-info">
                <div class="city-name" id="displayCity">London</div>
                <div class="date-time" id="displayDate">Wednesday, 29 April 2026</div>
                <div class="temp-main"><span id="displayTemp">18</span>°C</div>
                <div class="weather-desc" id="displayDesc">Scattered Clouds</div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Humidity</div>
                        <div class="stat-value"><span id="displayHumidity">65</span>%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Wind Speed</div>
                        <div class="stat-value"><span id="displayWind">12</span> km/h</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Pressure</div>
                        <div class="stat-value"><span id="displayPressure">1012</span> hPa</div>
                    </div>
                </div>
            </div>
            <div class="weather-visual">
                <img src="https://openweathermap.org/img/wn/04d@4x.png" id="displayIcon" class="weather-icon-large" alt="weather icon">
            </div>
        </div>

        <div class="ai-prediction-card">
            <div class="ai-badge">SMART FORECAST</div>
            <div class="ai-label">Our AI Model predicts the next 12h temperature trend:</div>
            <div class="ai-value"><span id="displayPrediction">20.5</span>°C</div>
            <div class="ai-label">Based on atmospheric pressure and humidity gradients.</div>
        </div>

        <div class="forecast-section">
            <div class="section-title">5-Day Forecast</div>
            <div class="forecast-grid" id="forecastGrid">
                <!-- Forecast cards will be injected here -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ""; // Relative path

        async function fetchWeather(city) {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            try {
                const response = await fetch(`${API_BASE}/weather_data?city=${city}`);
                const data = await response.json();
                
                if (data.error) {
                    alert("City not found or API error");
                    return;
                }

                // Update UI
                document.getElementById('displayCity').innerText = data.current.city;
                document.getElementById('displayTemp').innerText = Math.round(data.current.temperature);
                document.getElementById('displayHumidity').innerText = data.current.humidity;
                document.getElementById('displayWind').innerText = Math.round(data.current.wind_speed);
                document.getElementById('displayPressure').innerText = data.current.pressure;
                document.getElementById('displayDesc').innerText = data.current.description;
                document.getElementById('displayIcon').src = `https://openweathermap.org/img/wn/${data.current.icon}@4x.png`;
                
                document.getElementById('displayPrediction').innerText = data.prediction.toFixed(1);

                // Update Forecast
                const grid = document.getElementById('forecastGrid');
                grid.innerHTML = '';
                data.forecast.forEach(day => {
                    const card = document.createElement('div');
                    card.className = 'forecast-card';
                    card.innerHTML = `
                        <div class="forecast-date">${new Date(day.date).toLocaleDateString('en-GB', {weekday: 'short', day: 'numeric', month: 'short'})}</div>
                        <img src="https://openweathermap.org/img/wn/${day.icon}@2x.png" class="forecast-icon" alt="icon">
                        <div class="forecast-temp">${Math.round(day.temp)}°C</div>
                        <div style="color: var(--text-dim); font-size: 0.8rem; text-transform: capitalize;">${day.description}</div>
                    `;
                    grid.appendChild(card);
                });

                document.getElementById('displayDate').innerText = new Date().toLocaleDateString('en-GB', {
                    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
                });

            } catch (error) {
                console.error("Error fetching weather:", error);
            } finally {
                loader.style.display = 'none';
            }
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                const city = document.getElementById('cityInput').value;
                if (city) fetchWeather(city);
            }
        }

        // Initial fetch
        window.onload = () => fetchWeather('London');
    </script>
</body>
</html>
